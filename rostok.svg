<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <!-- Мягкая тень в стиле Apple -->
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="blur"/>
      <feOffset dx="0" dy="10" result="offsetBlur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.12"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Градиент стебля -->
    <linearGradient id="stemGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#A5D6A7"/>
      <stop offset="100%" stop-color="#43A047"/>
    </linearGradient>

    <!-- Градиент листьев -->
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="50%" stop-color="#81C784"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>

    <!-- Фоновое свечение -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F1F8E9" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FAFAFA" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Фон -->
  <rect width="400" height="400" fill="#FAFAFA"/>
  <circle cx="200" cy="200" r="170" fill="url(#bgGlow)"/>

  <!-- Росток -->
  <g filter="url(#softShadow)">
    <!-- Стебель -->
    <path d="M200 270 Q206 190 194 130 Q188 90 200 70" 
          fill="none" stroke="url(#stemGrad)" stroke-width="7" stroke-linecap="round"/>

    <!-- Левый лист -->
    <path d="M194 140 Q145 110 115 135 Q135 155 194 140 Z" 
          fill="url(#leafGrad)"/>
    <!-- Правый лист -->
    <path d="M198 120 Q245 85 280 100 Q255 125 198 120 Z" 
          fill="url(#leafGrad)"/>

    <!-- Жилки (полупрозрачные) -->
    <path d="M194 140 Q155 120 120 140" fill="none" stroke="#66BB6A" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
    <path d="M198 120 Q230 95 270 105" fill="none" stroke="#66BB6A" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
  </g>
</svg>