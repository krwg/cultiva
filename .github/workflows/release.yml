name: Build and Release

on:
  push:
    tags:
      - 'v*'
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test

      - name: Build Vite
        run: npm run prebuild && npm run build

      - name: Build Electron (${{ matrix.platform }})
        run: npx electron-builder --${{ matrix.platform }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_ENV: production
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cultiva-${{ matrix.platform }}
          path: |
            release/Cultiva-Setup-*.exe
            release/Cultiva-Portable-*.exe
            release/Cultiva-*.dmg
            release/Cultiva-*-mac-*.zip
            release/Cultiva-*-linux-*.AppImage
            release/Cultiva-*-linux-*.deb
            release/latest*.yml
            release/*.blockmap
          if-no-files-found: warn

  publish:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          mapfile -t files < <(find artifacts -type f | sort)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release artifacts found under artifacts/" >&2
            exit 1
          fi
          echo "Publishing ${#files[@]} file(s) for tag ${TAG}"

          NAME="$(python3 -c "import json; print(json.load(open('cultiva.release.json'))['name'])")"
          CODE="$(python3 -c "import json; print(json.load(open('cultiva.release.json'))['codename'])")"
          TITLE="${NAME} ${TAG} · ${CODE}"

          NOTES_FILE=""
          shopt -s nullglob
          for candidate in "docs/release-notes-v${TAG}-"*.md; do
            NOTES_FILE="$candidate"
            break
          done
          shopt -u nullglob

          is_transient() {
            local msg="$1"
            echo "$msg" | grep -Eiq 'unicorn|502|503|504|timeout|temporar|rate limit|i/o timeout|connection reset|EOF|gateway'
          }

          retry() {
            local attempt=1
            local max=8
            local delay=8
            local out rc
            while true; do
              set +e
              out="$("$@" 2>&1)"
              rc=$?
              set -e
              if [ "$rc" -eq 0 ]; then
                printf '%s\n' "$out"
                return 0
              fi
              printf '%s\n' "$out" >&2
              if [ "$attempt" -ge "$max" ] || ! is_transient "$out"; then
                echo "Command failed after ${attempt} attempt(s): $*" >&2
                return "$rc"
              fi
              echo "Transient failure (attempt ${attempt}/${max}); retrying in ${delay}s…" >&2
              sleep "$delay"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
              if [ "$delay" -gt 60 ]; then
                delay=60
              fi
            done
          }

          # Force-retags leave a release row that `gh release view/edit` cannot
          # resolve. Delete by REST id so create can bind to the current tag.
          RID="$(gh api "repos/${GITHUB_REPOSITORY}/releases?per_page=100" \
            --jq ".[] | select(.tag_name == \"${TAG}\") | .id" 2>/dev/null | head -n1 || true)"
          if [ -n "${RID}" ]; then
            echo "Removing existing release id=${RID} for tag ${TAG}"
            retry gh api -X DELETE "repos/${GITHUB_REPOSITORY}/releases/${RID}"
          fi

          echo "Creating release ${TAG}"
          if [ -n "$NOTES_FILE" ]; then
            retry gh release create "$TAG" \
              --title "$TITLE" \
              --notes-file "$NOTES_FILE" \
              --latest \
              "${files[@]}"
          else
            retry gh release create "$TAG" \
              --title "$TITLE" \
              --generate-notes \
              --latest \
              "${files[@]}"
          fi

          echo "Published: https://github.com/${GITHUB_REPOSITORY}/releases/tag/${TAG}"
