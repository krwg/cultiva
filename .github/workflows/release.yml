name: Build and Release

on:
  push:
    tags:
      - 'v*'
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test
        
      - name: Build Vite
        run: npm run build
        
      - name: Build Electron
        run: npm run electron:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_ENV: production
          
      - name: List release files
        run: dir release
        shell: cmd
        
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/Cultiva-Setup-*.exe
            release/Cultiva-Portable-*.exe
            release/latest.yml
            release/*.blockmap
          draft: false
          prerelease: false
          body_path: docs/release-notes-v1.1.0-cypress-github.md
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}