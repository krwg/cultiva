<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar | Cultiva</title>
    <link rel="stylesheet" href="../styles/main.css">
    <script type="module">
    window.TRANSLATIONS = window.TRANSLATIONS || {
        en: {
            backBtn: 'Back', calendar: 'Calendar', sun: 'Sun', mon: 'Mon', tue: 'Tue',
            wed: 'Wed', thu: 'Thu', fri: 'Fri', sat: 'Sat', footerHome: 'Home',
            footerTips: 'Tips', footerPrivacy: 'Privacy'
        },
        ru: {
            backBtn: 'Назад', calendar: 'Календарь', sun: 'Вс', mon: 'Пн', tue: 'Вт',
            wed: 'Ср', thu: 'Чт', fri: 'Пт', sat: 'Сб', footerHome: 'Главная',
            footerTips: 'Советы', footerPrivacy: 'Приватность'
        }
    };
</script>
    <link rel="icon" type="image/png" sizes="32x32" href="../images/favicon.ico">
   <style>
    :root {
        --calendar-today: var(--accent-blue);
        --calendar-event: var(--accent-pink);
        --calendar-holiday: #ff9500;
    }
    body.theme-dark .calendar-header,
    body.theme-moon .calendar-header,
    body.theme-pink .calendar-header { 
        background: var(--bg-secondary) !important; 
        border-bottom-color: var(--border-light) !important;
    }
    .calendar-header { 
        position: sticky; top: 0; z-index: 100; 
        background: var(--bg-secondary) !important; 
        backdrop-filter: saturate(180%) blur(20px); 
        -webkit-backdrop-filter: saturate(180%) blur(20px); 
        border-bottom: 1px solid var(--border-light) !important;
        transition: background 0.3s var(--ease-apple), border-color 0.3s var(--ease-apple);
    }
    .calendar-container { max-width: 1000px; margin: 0 auto; padding: 0 24px; }
    .calendar-nav { display: flex; align-items: center; justify-content: space-between; height: 52px; }
    .calendar-back { color: var(--accent-blue); text-decoration: none; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 4px; }
    .calendar-back:hover { opacity: 0.7; }
    .calendar-title { font-size: 20px; font-weight: 600; color: var(--text-primary); }
    .calendar-controls { display: flex; align-items: center; gap: 8px; }
    .btn-calendar { width: 32px; height: 32px; border-radius: 50%; background: var(--bg-tertiary); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--text-secondary); transition: all 0.2s; }
    .btn-calendar:hover { background: var(--border-light); color: var(--text-primary); }
    .calendar-body { padding: 24px 0 80px; }
    .calendar-grid { background: var(--bg-primary); border-radius: 20px; padding: 20px; border: 1px solid var(--border-light); }
    .calendar-month { text-align: center; font-size: 18px; font-weight: 600; color: var(--text-primary); margin-bottom: 16px; }
    .calendar-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 8px; }
    .weekday { text-align: center; font-size: 12px; font-weight: 500; color: var(--text-secondary); padding: 8px 0; }
    .calendar-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 12px; font-size: 14px; color: var(--text-primary); cursor: pointer; transition: all 0.2s; position: relative; min-height: 44px; }
    .day:hover { background: var(--bg-tertiary); }
    .day.today { background: var(--calendar-today) !important; color: #fff !important; font-weight: 600; }
    .day.other-month { color: var(--text-tertiary); opacity: 0.5; }
    .day.has-event::after { content: ""; position: absolute; bottom: 6px; width: 6px; height: 6px; background: var(--calendar-event); border-radius: 50%; }
    .day.has-holiday::before { content: ""; position: absolute; top: 6px; width: 6px; height: 6px; background: var(--calendar-holiday); border-radius: 50%; }
    .day.selected { box-shadow: 0 0 0 2px var(--accent-blue); }
    .calendar-note-panel { margin-top: 24px; background: var(--bg-primary); border-radius: 16px; padding: 20px; border: 1px solid var(--border-light); display: none; }
    .calendar-note-panel.active { display: block; animation: slideUp 0.3s ease; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .note-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .note-date { font-size: 14px; font-weight: 600; color: var(--text-primary); }
    .note-close { background: none; border: none; font-size: 20px; color: var(--text-secondary); cursor: pointer; }
    .note-input { width: 100%; min-height: 80px; padding: 12px; border-radius: 12px; border: 1px solid var(--border-light); background: var(--bg-tertiary); color: var(--text-primary); font-size: 14px; resize: none; outline: none; transition: border-color 0.2s; }
    .note-input:focus { border-color: var(--accent-blue); }
    .note-hints { margin-top: 8px; font-size: 12px; color: var(--text-tertiary); display: flex; gap: 12px; }
    .note-hints span { display: flex; align-items: center; gap: 4px; }
    .holiday-badge { position: absolute; top: 4px; right: 4px; font-size: 10px; background: var(--calendar-holiday); color: #fff; padding: 2px 6px; border-radius: 4px; font-weight: 500; }
    @media (max-width: 768px) {
        .calendar-container { padding: 0 16px; }
        .calendar-grid { padding: 16px; border-radius: 16px; }
        .day { font-size: 13px; min-height: 40px; }
        .weekday { font-size: 11px; }
    }
</style>
</head>
<body class="calendar-page">
    <header class="calendar-header">
        <div class="calendar-container calendar-nav">
            <a href="../index.html" class="calendar-back">← <span data-i18n="backBtn">Back</span></a>
            <span class="calendar-title" data-i18n="calendar">Calendar</span>
            <div class="calendar-controls">
                <button class="btn-calendar" id="prev-month" aria-label="Previous month">‹</button>
                <button class="btn-calendar" id="next-month" aria-label="Next month">›</button>
            </div>
        </div>
    </header>

    <main class="calendar-container calendar-body">
        <div class="calendar-grid">
            <div class="calendar-month" id="calendar-month">April 2026</div>
            <div class="calendar-weekdays">
                <div class="weekday" data-i18n="sun">Sun</div>
                <div class="weekday" data-i18n="mon">Mon</div>
                <div class="weekday" data-i18n="tue">Tue</div>
                <div class="weekday" data-i18n="wed">Wed</div>
                <div class="weekday" data-i18n="thu">Thu</div>
                <div class="weekday" data-i18n="fri">Fri</div>
                <div class="weekday" data-i18n="sat">Sat</div>
            </div>
            <div class="calendar-days" id="calendar-days"></div>
        </div>

        <div class="calendar-note-panel" id="note-panel">
            <div class="note-header">
                <span class="note-date" id="note-date">April 15, 2026</span>
                <button class="note-close" id="note-close">&times;</button>
            </div>
            <textarea class="note-input" id="note-input" placeholder="Add a note for this day..."></textarea>
            <div class="note-hints">
                <span>Auto-saved</span>
                <span id="holiday-hint" style="display:none">🎉 <span id="holiday-name"></span></span>
            </div>
        </div>
    </main>

    <footer class="app-footer">
        <div class="footer-content">
            <nav class="footer-links">
                <a href="../index.html" data-i18n="footerHome">Home</a>
                <a href="../pages/tips.html" data-i18n="footerTips">Tips</a>
                <a href="../pages/privacy.html" data-i18n="footerPrivacy">Privacy</a>
                <a href="https://github.com/krwg/cultiva" target="_blank" rel="noopener">GitHub</a>
            </nav>
            <div class="footer-brand"><span class="footer-version">[0.2.2] Aspen</span></div>
        </div>
    </footer>

<script>
    // ===== CONFIG =====
    const HOLIDAY_API = 'https://date.nager.at/api/v3/PublicHolidays/{year}/{country}';
    const STORAGE_KEY = 'cultiva-calendar-notes';

    // ===== STATE =====
    let currentDate = new Date();
    let selectedDate = null;
    let holidays = {};
    let notes = {};

    // ===== HELPERS: THEME & TIMEZONE =====
    function getSavedTheme() { return localStorage.getItem('cultiva-theme') || 'auto'; }
    function getSavedTZ() { return localStorage.getItem('cultiva-timezone') || 'auto'; }
    
    function getTZName() { const tz = getSavedTZ(); return tz === 'auto' ? undefined : tz; }
    
    function getTodayInTZ() {
        const tz = getTZName();
        const now = new Date();
        return now.toLocaleDateString('en-CA', { timeZone: tz }); // YYYY-MM-DD
    }

    const fmt = {
        month: (d) => d.toLocaleString(navigator.language, { timeZone: getTZName(), month: 'long', year: 'numeric' }),
        full: (d) => d.toLocaleString(navigator.language, { timeZone: getTZName(), weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' }),
        key: (d) => d.toISOString().split('T')[0]
    };

    // ===== THEME SYNC =====
    function syncTheme() {
        const theme = getSavedTheme();
        document.body.classList.remove('theme-light', 'theme-dark', 'theme-pink', 'theme-moon');
        if (theme === 'auto') {
            const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            document.body.classList.add(isDark ? 'theme-dark' : 'theme-light');
        } else {
            document.body.classList.add(`theme-${theme}`);
        }
    }
    syncTheme();
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', syncTheme);
    window.addEventListener('storage', (e) => {
        if (e.key === 'cultiva-theme') syncTheme();
        if (e.key === 'cultiva-timezone') { currentDate = new Date(); renderCalendar(); }
    });

    // ===== DATA =====
    function loadNotes() { try { const s = localStorage.getItem(STORAGE_KEY); if(s) notes = JSON.parse(s); } catch(e){} }
    function saveNotes() { localStorage.setItem(STORAGE_KEY, JSON.stringify(notes)); }

    async function fetchHolidays(year, country) {
        try {
            const res = await fetch(HOLIDAY_API.replace('{year}', year).replace('{country}', country));
            return res.ok ? (await res.json()).map(h => ({ date: h.date, name: h.localName })) : [];
        } catch(e) { return []; }
    }

    // ===== RENDER =====
    function renderCalendar() {
        const year = currentDate.getFullYear();
        const month = currentDate.getMonth();
        document.getElementById('calendar-month').textContent = fmt.month(currentDate);

        const firstDay = new Date(Date.UTC(year, month, 1));
        const lastDay = new Date(Date.UTC(year, month + 1, 0));
        const startDay = firstDay.getUTCDay();
        const daysInMonth = lastDay.getUTCDate();
        const container = document.getElementById('calendar-days');
        container.innerHTML = '';

        const todayStr = getTodayInTZ();

        const prevMonthLast = new Date(Date.UTC(year, month, 0)).getUTCDate();
        for (let i = startDay - 1; i >= 0; i--) container.appendChild(createDay(prevMonthLast - i, true));

        for (let day = 1; day <= daysInMonth; day++) {
            const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
            const isToday = dateStr === todayStr;
            const hasNote = notes[dateStr]?.trim();
            const holiday = holidays[dateStr];

            const cell = createDay(day, false);
            if (isToday) cell.classList.add('today');
            if (hasNote) cell.classList.add('has-event');
            if (holiday) {
                cell.classList.add('has-holiday');
                cell.innerHTML += `<span class="holiday-badge">🎉</span>`;
            }
            cell.dataset.date = dateStr;
            cell.addEventListener('click', () => openNotePanel(new Date(`${dateStr}T12:00:00`), holiday));
            container.appendChild(cell);
        }

        const total = startDay + daysInMonth;
        const remaining = 42 - total;
        for (let day = 1; day <= remaining; day++) container.appendChild(createDay(day, true));
    }

    function createDay(day, isOther) {
        const c = document.createElement('div');
        c.className = `day ${isOther ? 'other-month' : ''}`;
        c.textContent = day;
        return c;
    }

    function openNotePanel(date, holiday) {
        selectedDate = date;
        const key = date.toISOString().split('T')[0];
        document.getElementById('note-date').textContent = fmt.full(date);
        document.getElementById('note-input').value = notes[key] || '';
        
        const hint = document.getElementById('holiday-hint');
        if (holiday) { document.getElementById('holiday-name').textContent = holiday; hint.style.display = 'flex'; }
        else hint.style.display = 'none';
        
        document.getElementById('note-panel').classList.add('active');
        document.getElementById('note-input').focus();
    }

    function closeNotePanel() {
        if (selectedDate) {
            const key = selectedDate.toISOString().split('T')[0];
            const val = document.getElementById('note-input').value.trim();
            if (val) notes[key] = val; else delete notes[key];
            saveNotes(); renderCalendar();
        }
        document.getElementById('note-panel').classList.remove('active');
        selectedDate = null;
    }

    // ===== EVENTS =====
    document.getElementById('prev-month').addEventListener('click', () => { currentDate.setUTCMonth(currentDate.getUTCMonth() - 1); renderCalendar(); });
    document.getElementById('next-month').addEventListener('click', () => { currentDate.setUTCMonth(currentDate.getUTCMonth() + 1); renderCalendar(); });
    document.getElementById('note-close').addEventListener('click', closeNotePanel);
    document.getElementById('note-input').addEventListener('blur', closeNotePanel);
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeNotePanel(); });

    // ===== INIT =====
    async function init() {
        loadNotes();
        const year = currentDate.getUTCFullYear();
        const settings = JSON.parse(localStorage.getItem('cultiva-settings') || '{}');
        const country = settings.holidayRegion || 'us';
        const [h1, h2] = await Promise.all([fetchHolidays(year, country), fetchHolidays(year+1, country)]);
        [...h1, ...h2].forEach(h => { holidays[h.date] = h.name; });
        renderCalendar();
    }

    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
    else init();

document.addEventListener('DOMContentLoaded', () => {
    setTimeout(() => {
        syncTheme();
        renderCalendar();
    }, 100);
});

function applyCalendarTranslations() {
    const lang = localStorage.getItem('cultiva-lang') || 'en';
    const t = window.TRANSLATIONS?.[lang] || window.TRANSLATIONS?.en;
    if (!t) return;
    
    document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.dataset.i18n;
        if (t[key]) {
            if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
                el.placeholder = t[key];
            } else {
                el.textContent = t[key];
            }
        }
    });
}


document.addEventListener('DOMContentLoaded', () => {
    setTimeout(applyCalendarTranslations, 150);
});


window.addEventListener('storage', (e) => {
    if (e.key === 'cultiva-lang') {
        setTimeout(applyCalendarTranslations, 50);
    }
});

window.addEventListener('storage', (e) => {
    if (e.key === 'cultiva-theme') {
        setTimeout(() => { syncTheme(); renderCalendar(); }, 50);
    }
    if (e.key === 'cultiva-lang') {
        setTimeout(applyCalendarTranslations, 50);
    }
});
</script>
</body>
</html>
