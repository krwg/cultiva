<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error — Cultiva</title>
    <link rel="stylesheet" href="../styles/main.css">
    <style>
        /* === ERROR PAGE STYLES === */
        .error-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: var(--bg-secondary);
            font-family: var(--font-main);
            -webkit-font-smoothing: antialiased;
        }
        
        .error-container {
            max-width: 480px;
            width: 100%;
            text-align: center;
            animation: fadeInUp 0.6s var(--ease-apple) forwards;
            opacity: 0;
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .error-visual {
            margin-bottom: 32px;
            position: relative;
        }
        
        .error-icon {
            width: 88px;
            height: 88px;
            margin: 0 auto;
            background: var(--bg-primary);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            box-shadow: var(--shadow-md);
            animation: float 4s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }
        
        .error-code {
            font-size: clamp(72px, 14vw, 112px);
            font-weight: 800;
            letter-spacing: -0.04em;
            line-height: 0.9;
            margin: 0;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--text-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .error-title {
            font-size: 24px;
            font-weight: 600;
            margin: 16px 0 8px;
            color: var(--text-primary);
            letter-spacing: -0.01em;
        }
        
        .error-desc {
            font-size: 16px;
            line-height: 1.5;
            color: var(--text-secondary);
            margin-bottom: 32px;
            max-width: 340px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .error-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn-error {
            padding: 12px 28px;
            border-radius: var(--radius-full);
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--duration-fast) var(--ease-apple);
            text-decoration: none;
            border: none;
            font-family: var(--font-main);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        
        .btn-error-primary {
            background: var(--accent-blue);
            color: white;
        }
        .btn-error-primary:hover {
            background: var(--accent-blue-hover);
            transform: scale(1.02);
        }
        
        .btn-error-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }
        .btn-error-secondary:hover {
            background: var(--border-medium);
        }
        
        @media (max-width: 480px) {
            .error-actions { flex-direction: column; }
            .btn-error { width: 100%; justify-content: center; }
            .error-icon { width: 72px; height: 72px; font-size: 32px; }
        }
    </style>
</head>
<body class="error-page">
    <main class="error-container">
        <div class="error-visual">
            <div class="error-icon" id="error-icon">🌱</div>
        </div>
        <h1 class="error-code" id="error-code">404</h1>
        <h2 class="error-title" id="error-title">Page Not Found</h2>
        <p class="error-desc" id="error-desc">The garden you're looking for has wilted or never existed.</p>
        <div class="error-actions">
            <a href="/" class="btn-error btn-error-primary">Return to Garden</a>
            <button onclick="history.back()" class="btn-error btn-error-secondary">Go Back</button>
        </div>
    </main>

    <script>
        const ERRORS = {
            333: { icon: '🎲', title: 'Lucky Number', desc: 'You rolled a 333! The garden is feeling extra lucky today. Try again, maybe you\'ll find a hidden seed.' },
            400: { icon: '🥀', title: 'Bad Request', desc: 'The request couldn\'t be understood. Please check your input and try again.' },
            403: { icon: '🔒', title: 'Access Denied', desc: 'You don\'t have permission to enter this part of the garden.' },
            404: { icon: '🌵', title: 'Page Not Found', desc: 'The path you followed led to an empty plot. It might have been moved or deleted.' },
            418: { icon: '🫖', title: "I'm a Teapot", desc: 'Syntax Error: Missing Colon. The parser is crying. (Just kidding, but this error exists!)' },
            500: { icon: '⚡', title: 'Server Error', desc: 'Something unexpected happened in our greenhouse. We\'re fixing it right now.' },
            502: { icon: '🌧️', title: 'Bad Gateway', desc: 'Our servers are experiencing a temporary connection storm. Please wait a moment.' },
            503: { icon: '🚜', title: 'Under Maintenance', desc: 'We\'re currently tending to the garden. Check back shortly.' }
        };

        const params = new URLSearchParams(window.location.search);
        const code = parseInt(params.get('code')) || 404;
        const error = ERRORS[code] || { 
            icon: '🌿', 
            title: `Error ${code}`, 
            desc: 'An unexpected vine tangled the path. Our gardeners are working on it.' 
        };

        document.getElementById('error-code').textContent = code;
        document.getElementById('error-icon').textContent = error.icon;
        document.getElementById('error-title').textContent = error.title;
        document.getElementById('error-desc').textContent = error.desc;
        document.title = `${code} ${error.title} — Cultiva`;
    </script>
</body>
</html>
